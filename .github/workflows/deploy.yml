name: Deploy

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Azure deployment environment (dev, staging, prod)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: prod

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-azure:
    name: Deploy to Azure AI Foundry Agent Service
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    if: github.event_name == 'workflow_dispatch'
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[azure]"

      - name: Install Azure Developer CLI (azd)
        run: curl -fsSL https://aka.ms/install-azd.sh | bash

      - name: Install azure-ai-agents extension
        run: azd extension add azure-ai-agents

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Select azd environment
        run: azd env select "$AZURE_ENV_NAME"

      - name: Link to Azure AI Foundry project
        env:
          AZURE_AI_PROJECT_ID: ${{ secrets.AZURE_AI_PROJECT_ID }}
        run: |
          azd ai agent init \
            --project-id "$AZURE_AI_PROJECT_ID" \
            --non-interactive

      - name: Deploy
        run: azd deploy cto-agent

      - name: Capture deployment outputs
        id: capture-outputs
        continue-on-error: true
        run: |
          OUTPUTS=$(azd output --output json 2>/dev/null || echo '{}')
          AGENT_ID=$(echo "$OUTPUTS" | jq -r '.agentId.value // empty' 2>/dev/null || true)
          if [ -n "$AGENT_ID" ]; then
            echo "::add-mask::$AGENT_ID"
            echo "agent_resource=$AGENT_ID" >> "$GITHUB_OUTPUT"
          fi
