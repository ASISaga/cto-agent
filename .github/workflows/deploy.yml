# Deploy workflow for ASISaga/cto-agent
#
# Copy this file to .github/workflows/deploy.yml in the cto-agent repository.
#
# This workflow deploys the CTO Agent definition to Azure AI Foundry Agent Service
# using OIDC (passwordless) authentication.
#
# The agent repository must contain an agent.yaml file at the repository root:
#
#   name: "CTO Agent"
#   model: "gpt-4o"
#   instructions: |
#     You are the CTO Agent...
#   tools:
#     - type: code_interpreter
#     - type: file_search
#   metadata:
#     version: "1.0"
#
# Prerequisites — run once from ASISaga/aos-infrastructure:
#   1. Deploy infrastructure:  workflow_dispatch on infrastructure-deploy.yml
#      The Bicep templates create the AI Foundry project and configure OIDC for this repo.
#   2. Create GitHub Environments in THIS repo: dev, staging, prod
#   3. Add the following secrets to each environment:
#        AZURE_CLIENT_ID          — Managed identity client ID for OIDC authentication.
#        AZURE_TENANT_ID          — Azure AD tenant ID.
#        AZURE_SUBSCRIPTION_ID    — Azure subscription ID.
#        FOUNDRY_PROJECT_ENDPOINT — Azure AI Foundry project endpoint URL.
#                                   Retrieve from Azure portal or Key Vault after infra provisioning:
#                                     python3 - <<'PYEOF'
#                                     import os
#                                     from azure.identity import DefaultAzureCredential
#                                     from azure.keyvault.secrets import SecretClient
#                                     cred = DefaultAzureCredential()
#                                     kv = SecretClient(vault_url="https://<kv-name>.vault.azure.net", credential=cred)
#                                     print(kv.get_secret("foundry-project-endpoint-<env>").value)
#                                     PYEOF
#   4. Optionally add variable AZURE_RESOURCE_GROUP (defaults to rg-aos-<env>)
#
# See deployment/workflow-templates/README.md in ASISaga/aos-infrastructure for full setup guide.

name: Deploy to Azure AI Foundry

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
  # Triggered automatically by ASISaga/aos-infrastructure after successful
  # infrastructure provisioning.  The payload includes the environment name.
  repository_dispatch:
    types:
      - infra_provisioned

permissions:
  id-token: write
  contents: read

jobs:
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Resolve deploy environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "environment=${{ github.event.client_payload.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy
    needs: resolve-env
    environment: ${{ needs.resolve-env.outputs.environment }}
    uses: ASISaga/aos-infrastructure/.github/workflows/deploy-foundry-agent.yml@main
    with:
      agent-name: 'cto-agent'
      environment: ${{ needs.resolve-env.outputs.environment }}
    secrets: inherit
